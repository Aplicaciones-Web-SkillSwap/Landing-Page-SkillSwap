<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO Meta Tags ── -->
    <meta name="description" content="Conecta con estudiantes universitarios verificados para recibir tutorías en línea." />

    <!-- ── SEO Bilingüe: hreflang (US35) ── -->
    <!--
      Estas etiquetas le dicen a Google qué versión de idioma mostrar según la región.
      Cuando el usuario esté en español, el <head> se estructura así:
      lang="es" + hreflang="es/en/x-default" apuntando a la misma URL
      (una SPA no tiene rutas distintas, así que href apunta al mismo index.html)
    -->
    <link rel="alternate" hreflang="es" href="login.html" />
    <link rel="alternate" hreflang="en" href="login.html" />
    <link rel="alternate" hreflang="x-default" href="login.html" />

    <link rel="stylesheet" href="../assets/styles/login_stylesheet.css"/>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <title>SkillSwap | La Red Interuniversitaria Más Grande del Perú</title>
  </head>

  <body>

    <!-- ═══════════════════════════════════════ NAV ═══════════════════════════════════════ -->
    <nav class="barra-navegacion">

      <!-- Botón menú hamburguesa -->
      <div class="menu-hamburguesa" id="btn-menu" aria-label="Abrir menú" role="button" tabindex="0">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- Logo -->
      <div class="logo">
        <a href="../index.html">
          <img src="../assets/images/SkillSwap_logo.png" alt="Logo SkillSwap" />
        </a>
      </div>

      <!-- Menú principal -->
      <div class="menu-horizontal">
        <ul class="menu-horizontal-opciones">

          <li><a href="sitios/alianzas.html"   data-i18n="nav-alianzas">Alianzas</a></li>
          <li><a href="sitios/proyectos.html"  data-i18n="nav-proyectos">Proyectos</a></li>
          <li><a href="sitios/index-sobre-nosotros.html" data-i18n="nav-sobre-nosotros">Sobre nosotros</a></li>

          <li>
            <a href="login.html">
              <button class="btn-iniciarsesion" data-i18n="nav-login">Iniciar Sesión</button>
            </a>
          </li>
          <li>
            <a href="sitios/index-registrarse.html">
              <button class="btn-registrase" data-i18n="nav-register">Registrarse</button>
            </a>
          </li>

          <!-- ── Selector de Idioma (US35) ── -->
          <li class="lang-switcher-item">
            <div class="lang-switcher" role="group" aria-label="Seleccionar idioma">
              <button class="lang-btn active" data-lang="es" onclick="applyLanguage('es')" aria-label="Español">ES</button>
              <span class="lang-divider">|</span>
              <button class="lang-btn"        data-lang="en" onclick="applyLanguage('en')" aria-label="English">EN</button>
            </div>
          </li>

        </ul>
      </div>
    </nav>

  <section id="inicio-sesion">
      <div class="seccion-inicio-sesion">
        <h2 class="login-titulo">Inicio de Sesión</h2>
        <div class="titulo-decorador"></div>
        
        <form class="formulario-inicio-sesion" onsubmit="validarLogin(event)">
          
          <div class="formulario-inicio-sesion-elemento">
            <label for="email">Usuario o Correo Institucional*</label>
            <input type="text" id="email" name="correo" placeholder="Ej: admin, u20201234@upc.edu.pe" required>
          </div>

          <div class="formulario-inicio-sesion-elemento">
            <label for="password">Contraseña*</label>
            <input type="password" id="password" name="contrasenia" placeholder="Introduce tu contraseña" required>
          </div>

          <div class="formulario-inicio-sesion-elemento">
            <input type="submit" value="Iniciar Sesión">
          </div>
        </form>

        <label>¿No tienes cuenta?
          <a href="index-registrarse.html">Regístrate</a>
        </label>
      </div>
    </section>

    <script src="../assets/scripts/login.js"></script>

     <footer>
      <div class="seccion-footer">
        <p>2025 SkillSwap... Todos los derechos reservados. <a href="../archivos/TerminosCondiciones.pdf" class="terminos-condiciones">Terminos y Condiciones</a> </p>
      </div>
    </footer>
    <!--script menu hamburguesa-->
<script>
// 1. MENU HAMBURGUESA PRINCIPAL
    const btnMenu = document.getElementById('btn-menu');
    const menu = document.querySelector('.barra-navegacion .menu-horizontal');
    
    if(btnMenu) {
        btnMenu.addEventListener('click', () => {
            menu.classList.toggle('activo');
        });
    }

    // 2. SUBMENU ALIANZAS (SOLO MÓVIL)
    const btnAlianzas = document.getElementById("btn-alianzas");
    const submenuAlianzas = document.getElementById("submenu-alianzas");

    if (btnAlianzas && submenuAlianzas) {
        btnAlianzas.addEventListener("click", (event) => {
            // Solo actuar si estamos en modo celular
            if (window.innerWidth <= 768) {
                event.preventDefault(); // Evita que recargue la página al tocar "Alianzas"
                submenuAlianzas.classList.toggle("activo"); // Abre o cierra
            }
        });
    }
</script>

  </body>
</html>
